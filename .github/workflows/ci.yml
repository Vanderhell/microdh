name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake gcc

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMDH_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Strict warnings
        run: |
          cmake -B build_strict -DCMAKE_C_FLAGS="-Werror"
          cmake --build build_strict --parallel
